{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <h2 class="mb-4">Mis Vehículos Registrados</h2>
    
    <div class="table-responsive shadow-sm rounded">
        <table class="table table-striped table-hover mb-0">
            <thead class="table-dark">
                <tr>
                    <th>Placa</th>
                    <th>Marca</th>
                    <th>Modelo</th>
                    <th>Año</th>
                </tr>
            </thead>
            <tbody>
                {% for vehiculo in vehiculos %}
                <tr>
                    <td class="align-middle fw-bold">{{ vehiculo.placa }}</td>
                    <td class="align-middle">{{ vehiculo.marca }}</td>
                    <td class="align-middle">{{ vehiculo.modelo }}</td>
                    <td class="align-middle">{{ vehiculo.anio }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" class="text-center py-4">No tienes vehículos registrados aún.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

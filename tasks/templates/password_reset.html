{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Recuperar Contraseña</h4>
                </div>
                <div class="card-body p-4">
                    <p>Ingresa tu correo electrónico y te enviaremos las instrucciones :p .</p>
                    <form method="POST">
                        {% csrf_token %}
                        <!-- El formulario que Django genera automáticamente -->
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary w-100 mt-3">Enviar correo de recuperación</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

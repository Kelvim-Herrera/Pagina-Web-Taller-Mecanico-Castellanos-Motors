{% extends "base.html" %}

{% block title %}Iniciar Sesión - Gestión de Taller{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow border-0 mt-4">
            <div class="card-header bg-dark text-white text-center">
                <h4 class="mb-0"><i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Usuario o Correo</label>
                        <input type="text" class="form-control" name="username" placeholder="Ingresa tu usuario" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Contraseña</label>
                        <input type="password" class="form-control" name="password" placeholder="Ingresa tu contraseña" required>
                       <div class="mt-2 text-end">
                             <a href="{% url 'password_reset' %}" class="text-decoration-none text-warning">¿Olvidó su Contraseña?</a>
                    </div> 
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg">Entrar</button>
                </form>
                <div class="text-center mt-3">
                    <p class="text-muted">¿No tienes cuenta? <a href="/registro/" class="text-decoration-none">Regístrate aquí</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

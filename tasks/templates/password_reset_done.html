{% extends 'base.html' %} 
<!-- pagina para avisar al usuario que revise su bandeja de entrada-->

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card shadow-sm border-0">
                <div class="card-body p-5">
                    <h3 class="text-success mb-3"><i class="bi bi-envelope-check"></i> ¡Correo Enviado!</h3>
                    <p class="lead">Te hemos enviado un correo electrónico con las instrucciones para restablecer tu contraseña.</p>
                    <p class="text-muted small">Si no lo encuentras en tu bandeja de entrada principal, por favor revisa tu carpeta de spam o correo no deseado.</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
